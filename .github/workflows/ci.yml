name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # No committed lockfile (library convention), so `npm install`, not `npm ci`.
      - run: npm install

      - name: Lint + unit tests
        run: npm test

      - name: Build (dev + prod + dts + demo)
        run: npm run build
