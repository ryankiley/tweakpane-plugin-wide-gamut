<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>tweakpane-plugin-wide-gamut</title>
		<style>
			:root {
				color-scheme: dark;
			}
			html,
			body {
				height: 100%;
				margin: 0;
			}
			body {
				display: grid;
				place-items: center;
				min-height: 100vh;
				/* Driven live by the "background" binding below; this is just the
				   first-paint value before the script runs. */
				background-color: oklch(90% 0.22 100);
				font-family: system-ui, -apple-system, sans-serif;
			}
			#pane {
				width: 256px;
			}
			/* GitHub link — a bare mark, no chrome. Its colour flips between black
			   and white in JS to stay legible on whatever the picker paints. */
			.gh {
				position: fixed;
				top: 18px;
				right: 18px;
				display: block;
				color: #000;
				opacity: 0.85;
				transition: color 150ms ease, opacity 150ms ease, transform 150ms ease;
			}
			.gh:hover {
				opacity: 1;
				transform: translateY(-1px);
			}
			.gh svg {
				width: 26px;
				height: 26px;
				display: block;
				fill: currentColor;
			}
		</style>
	</head>
	<body>
		<a
			class="gh"
			href="https://github.com/ryankiley/tweakpane-plugin-wide-gamut"
			target="_blank"
			rel="noopener"
			aria-label="View on GitHub"
		>
			<svg viewBox="0 0 16 16" aria-hidden="true">
				<path
					d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
				/>
			</svg>
		</a>
		<div id="pane"></div>
		<script type="module">
			import {Pane} from './tweakpane.min.js';
			import * as WideGamutPlugin from './tweakpane-plugin-wide-gamut.js';

			const params = {background: 'oklch(90% 0.22 100)'};

			// Flip the GitHub mark between black and white so it stays legible on
			// whatever colour the picker paints. Resolve the (possibly oklch/P3)
			// value to sRGB via a 1px canvas, then pick ink by WCAG luminance.
			const gh = document.querySelector('.gh');
			const probe = document
				.createElement('canvas')
				.getContext('2d', {willReadFrequently: true});
			const lin = (c) => {
				c /= 255;
				return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
			};
			const contrastInk = (css) => {
				probe.fillStyle = '#000';
				probe.fillStyle = css;
				probe.fillRect(0, 0, 1, 1);
				const [r, g, b] = probe.getImageData(0, 0, 1, 1).data;
				const L = 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
				return L > 0.179 ? '#000' : '#fff';
			};

			const paint = (css) => {
				document.body.style.backgroundColor = css;
				gh.style.color = contrastInk(css);
			};
			paint(params.background);

			const pane = new Pane({
				container: document.getElementById('pane'),
				title: 'tweakpane-plugin-wide-gamut',
			});
			pane.registerPlugin(WideGamutPlugin);

			// `?expanded` opens the picker on load (handy for deep-links + captures).
			const expanded = new URLSearchParams(location.search).has('expanded');
			pane
				.addBinding(params, 'background', expanded ? {expanded: true} : {})
				.on('change', (ev) => paint(ev.value));
		</script>
	</body>
</html>
